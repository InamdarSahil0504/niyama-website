<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="114" fill="#4A7A68"/>
  <!-- Stem -->
  <line x1="256" y1="420" x2="256" y2="174" stroke="#F2F5F3" stroke-width="24" stroke-linecap="round"/>
  <!-- Left leaf (rotated ellipse) -->
  <ellipse cx="163" cy="308" rx="108" ry="70" fill="#F2F5F3" transform="rotate(-30 163 308)"/>
  <!-- Right leaf (rotated ellipse, slightly transparent) -->
